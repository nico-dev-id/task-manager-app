<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager App | Nico</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <div class="app">
        <h1>Task Manager App</h1>
        <p class="subtitle">Organize your tasks efficiently with JavaScript & LocalStorage</p>


        <div class="input-group">
            <input type="text" id="todo-input" placeholder="add new task...">
            <button id="add-btn">Tambah</button>
        </div>

        <div class="filters">
            <button id="filter-all">ALL</button>
            <button id="filter-active">Active</button>
            <button id="filter-done">Done</button>
        </div>

        <div class="actions">
            <button id="clear-all">Clear All</button>
        </div>

        <ul id="todo-list"></ul>

        <p id="task-count">0 task left</p>

    </div>


<script src="script.js?v=3"></script>
</body>
</html>
